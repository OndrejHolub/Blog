<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>About — Ondrej Holub</title>
  <meta name="description" content="About Ondrej Holub">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="wrapper">
      <h1 class="site-title"><a href="index.html">Ondrej Holub</a></h1>
      <button class="nav-toggle" aria-expanded="false" aria-controls="main-nav" aria-label="Toggle menu">
        <span></span>
      </button>
      <nav id="main-nav">
        <ul class="nav-list">
          <li><a href="index.html">Home</a></li>
          <li><a href="blog/">Blog</a></li>
          <li><a href="about.html" aria-current="page">About</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <article class="article-content">
      <div class="wrapper">
        <a href="index.html" class="back-link">← Back to home</a>
        <header class="article-header">
          <h1>About me</h1>
        </header>
        <p>I'm Ondrej Holub. This is my personal website where I share thoughts, projects, and things I'm working on.</p>
        <p>Feel free to explore the <a href="blog/">blog</a> or connect with me on <a href="https://github.com/OndrejHolub">GitHub</a>.</p>
      </div>
    </article>
  </main>

  <footer class="site-footer">
    <div class="wrapper">
      <p>&copy; 2025 Ondrej Holub · <a href="https://github.com/OndrejHolub/Blog">Source</a></p>
    </div>
  </footer>
  <script>
    (function() {
      var toggle = document.querySelector('.nav-toggle');
      var nav = document.querySelector('.nav-list');
      if (toggle && nav) {
        toggle.addEventListener('click', function() {
          var expanded = this.getAttribute('aria-expanded') === 'true';
          this.setAttribute('aria-expanded', !expanded);
          nav.setAttribute('data-visible', !expanded);
        });
      }
    })();
  </script>
</body>
</html>
