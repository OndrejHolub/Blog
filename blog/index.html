<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog — Ondrej Holub</title>
  <meta name="description" content="Blog of Ondrej Holub">
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="wrapper">
      <h1 class="site-title"><a href="../index.html">Ondrej Holub</a></h1>
      <button class="nav-toggle" aria-expanded="false" aria-controls="main-nav" aria-label="Toggle menu">
        <span></span>
      </button>
      <nav id="main-nav">
        <ul class="nav-list">
          <li><a href="../index.html">Home</a></li>
          <li><a href="index.html" aria-current="page">Blog</a></li>
          <li><a href="../about.html">About</a></li>
        </ul>
      </nav>
    </div>
  </header>

  <main>
    <section class="section">
      <div class="wrapper">
        <a href="../index.html" class="back-link">← Back to home</a>
        <h1 class="section-title">Blog</h1>
        <ul class="post-list">
          <li class="post-card">
            <h2><a href="posts/welcome.html">Welcome to my blog</a></h2>
            <p class="post-meta">March 23, 2025</p>
            <p class="post-excerpt">The first post on my new personal website. Here's what you can expect from this space.</p>
          </li>
        </ul>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="wrapper">
      <p>&copy; 2025 Ondrej Holub · <a href="https://github.com/OndrejHolub/Blog">Source</a></p>
    </div>
  </footer>
  <script>
    (function() {
      var toggle = document.querySelector('.nav-toggle');
      var nav = document.querySelector('.nav-list');
      if (toggle && nav) {
        toggle.addEventListener('click', function() {
          var expanded = this.getAttribute('aria-expanded') === 'true';
          this.setAttribute('aria-expanded', !expanded);
          nav.setAttribute('data-visible', !expanded);
        });
      }
    })();
  </script>
</body>
</html>
